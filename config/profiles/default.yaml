# Profile: default
# proc_scale = 0.5 — original conservative settings.
# num_disparities=336 (trackbar 20 → 21×16). At this scale:
#   fx_eff ≈ 2530 × 0.5 ≈ 1265 px
#   depth range: ~1.7 m (max disp 384) to ~95 m (min disp 4)
#
# Usage:
#   python3 examples/stereo_disparity_node.py \
#     --ros-args --params-file config/profiles/default.yaml -p show_preview:=true

/stereo_disparity_node:
  ros__parameters:
    profile: "default"
    num_disparities: 336
    min_disparity: 48
    block_size: 9
    p1_factor: 8
    p2_factor: 32
    disp12_max_diff: 2
    uniqueness_ratio: 10
    speckle_window_size: 120
    speckle_range: 2
    pre_filter_cap: 63
    mode: 2
    proc_scale: 0.5
    min_depth_m: 0.5
    max_depth_m: 10.0
    show_preview: false
    preview_scale: 0.5
